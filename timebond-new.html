<title>TimeBond - New UI</title>
<meta name="description" content="TimeBond — the redesigned UI of the shared calendar app.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .new-head { padding-top: clamp(40px, 6vw, 80px); }
  .new-head h1 {
    font-family: var(--font-display); font-weight: 600;
    font-size: clamp(40px, 8vw, 88px); line-height: 0.95;
    letter-spacing: -0.045em; margin: 0 0 18px;
  }
  .new-head .sub {
    font-family: var(--font-mono); font-size: clamp(14px, 1.6vw, 17px);
    color: var(--muted); max-width: 54ch; margin: 0; line-height: 1.55;
  }

  /* grid of smartphone screens */
  .screens {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(20px, 3vw, 36px);
    margin-top: clamp(36px, 5vw, 56px);
  }
  @media (max-width: 900px) { .screens { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 640px) { .screens { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 380px) { .screens { grid-template-columns: 1fr; } }

  .screen-fig { margin: 0; }
  .screen-fig .ph.phone {
    width: 100%; aspect-ratio: 9 / 19; min-height: 0;
    border-radius: 26px;
  }
  .screen-fig figcaption {
    font-family: var(--font-mono); font-size: 11.5px; letter-spacing: 0.03em;
    color: var(--muted); margin-top: 12px; text-align: center;
  }
</style>
</head>
